<!DOCTYPE html>
<html lang="it"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MoneyFlow Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0b1020;--card:#151c33;--accent:#7c5cff;--text:#fff;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);padding-bottom:90px}
.card{background:var(--card);margin:14px;border-radius:24px;padding:18px}
.header{padding:20px}.title{font-size:28px;font-weight:700}
.ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:auto;background:conic-gradient(var(--accent) 0deg,#2a335a 0deg)}
.ring div{width:105px;height:105px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center}
.tx{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #28304f}
input,select,button{width:100%;padding:14px;border:none;border-radius:14px;margin:6px 0}
input,select{background:#0f1530;color:white}
button{background:var(--accent);color:white;font-weight:bold}
.nav{position:fixed;bottom:0;left:0;right:0;background:#10172d;display:flex;justify-content:space-around;padding:12px}
.nav button{width:auto;background:none;color:white}
.page{display:none}.active{display:block}
</style></head>
<body>

<div id="home" class="page active">
<div class="header" style="display:flex;justify-content:space-between;align-items:center">
<div class="title">MoneyFlow</div>
<button id="resetBtn" onclick="resetData()" style="width:44px;background:#ff4d4d"><i class="fas fa-trash"></i></button>
</div>

<div class="card">
<h3>Budget Mensile</h3>
<input id="budget" type="number" placeholder="Budget €">
<button onclick="saveBudget()">Salva Budget</button>
</div>

<div class="card">
<div class="ring" id="ring"><div><span id="perc">0%</span></div></div>
<p>Speso: €<span id="spent">0</span></p>
<p id="remainingBox">Residuo: <span id="warning" style="display:none;color:#ff4d4d">🔺</span> €<span id="remaining">0</span></p>
</div>

<div class="card">
<h3>Ultime 3 Spese</h3>
<div id="last3"></div>
</div>
</div>

<div id="add" class="page">
<div class="header"><div class="title">➕ Aggiunta Rapida</div></div>
<div class="card">
<input id="amount" type="number" placeholder="Importo €">
<select id="cat">
<option>🍔 Alimentari</option>
<option>🚗 Trasporti</option>
<option>🏠 Casa</option>
<option>🎮 Svago</option>
<option>📦 Altro</option>
</select>
<button onclick="addExpense()">Salva Spesa</button>
</div>
</div>

<div id="historyPage" class="page">
<div class="header"><div class="title">📋 Cronologia</div></div>
<div class="card">
<div id="historyList"></div>
</div>
</div>

<div class="nav">
<button onclick="show('home')"><i class="fas fa-house"></i></button>
<button onclick="show('add')"><i class="fas fa-plus"></i></button>
<button onclick="show('historyPage')"><i class="fas fa-clock-rotate-left"></i></button>
</div>

<script>
const k=new Date().getFullYear()+"-"+(new Date().getMonth()+1);

function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function load(){
let e=JSON.parse(localStorage.getItem('e_'+k)||'[]');
let b=+localStorage.getItem('b_'+k)||0;
let t=e.reduce((a,x)=>a+x.amount,0);
let residuo=b-t;
let p=b?Math.min(100,(t/b)*100):0;

spent.textContent=t.toFixed(2);
remaining.textContent=residuo.toFixed(2);
perc.textContent=p.toFixed(0)+'%';

if(residuo<=100 && residuo>0){
warning.innerHTML='🔴'; warning.style.display='inline';
}else if(residuo<=300 && residuo>0){
warning.innerHTML='🔺'; warning.style.display='inline';
}else{
warning.style.display='none';
}

ring.style.background='conic-gradient(var(--accent) '+(p*3.6)+'deg,#2a335a 0deg)';

last3.innerHTML=e.slice().reverse().slice(0,3)
.map(x=>'<div class="tx"><span>'+x.cat+'</span><b>€'+x.amount.toFixed(2)+'</b></div>').join('');

document.getElementById('historyList').innerHTML=e.slice().reverse()
.map(x=>'<div class="tx"><span>'+x.cat+'</span><b>€'+x.amount.toFixed(2)+'</b></div>').join('');
}

function saveBudget(){
localStorage.setItem('b_'+k,budget.value);
load();
}

function addExpense(){
let amountValue=parseFloat(document.getElementById('amount').value);
if(isNaN(amountValue)) return;

let e=JSON.parse(localStorage.getItem('e_'+k)||'[]');
e.push({amount:amountValue,cat:cat.value,date:Date.now()});
localStorage.setItem('e_'+k,JSON.stringify(e));

amount.value='';
show('home');
load();
}


function resetData(){
 if(confirm('Eliminare tutte le spese del mese?')){
   localStorage.removeItem('e_'+k);
   load();
 }
}
load();
</script>
</body></html>
