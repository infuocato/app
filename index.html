<!DOCTYPE html><html lang="it"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>MoneyFlow</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0f172a;color:white;max-width:700px;margin:auto;padding:16px}
.card{background:#1e293b;border-radius:18px;padding:16px;margin:12px 0}
input,select,button{width:100%;padding:12px;border-radius:12px;border:none;margin:6px 0}
button{background:#38bdf8;font-weight:bold}
</style></head><body>
<h1>💰 MoneyFlow</h1>
<div class="card">
<h3>Budget Mensile</h3>
<input id="budget" type="number">
<button onclick="saveBudget()">Salva</button>
</div>
<div class="card">
<h3>Nuova Spesa</h3>
<input id="amount" type="number" placeholder="Importo">
<select id="cat"><option>🍔 Alimentari</option><option>🚗 Trasporti</option><option>🏠 Casa</option><option>🎮 Svago</option><option>📦 Altro</option></select>
<button onclick="addExpense()">Aggiungi</button>
</div>
<div class="card" id="summary"></div>
<script>
const k=new Date().getFullYear()+"-"+(new Date().getMonth()+1);
function load(){
let e=JSON.parse(localStorage.getItem("e_"+k)||"[]");
let b=+localStorage.getItem("b_"+k)||0;
let t=e.reduce((a,x)=>a+x.amount,0);
summary.innerHTML=`Budget €${b.toFixed(2)}<br>Speso €${t.toFixed(2)}<br>Residuo €${(b-t).toFixed(2)}`;
}
function saveBudget(){localStorage.setItem("b_"+k,budget.value);load();}
function addExpense(){
let e=JSON.parse(localStorage.getItem("e_"+k)||"[]");
e.push({amount:+amount.value,cat:cat.value});
localStorage.setItem("e_"+k,JSON.stringify(e));
amount.value='';load();
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
load();
</script></body></html>
